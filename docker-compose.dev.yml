# Development overrides — use with: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# Or: just run the services directly without Docker (recommended for development)

services:
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug
    volumes:
      - ./apps/api/src:/app/apps/api/src:ro
      - ./packages:/app/packages:ro
      - dev-db:/data
    ports:
      - "3000:3000"
    command: ["node", "--watch", "apps/api/src/index.js"]

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    ports:
      - "5173:80"

volumes:
  dev-db:
