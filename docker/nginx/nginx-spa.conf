server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Cache assets
    location ~* \.(js|css|png|svg|ico|woff2?)$ {
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
