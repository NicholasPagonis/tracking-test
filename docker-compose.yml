services:
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      LOG_LEVEL: info
      # Override these in .env or via docker compose --env-file
      DATABASE_URL: ${DATABASE_URL}
      API_KEY_DASHBOARD: ${API_KEY_DASHBOARD:-dev-dashboard-key}
      API_KEY_ADMIN: ${API_KEY_ADMIN:-dev-admin-key}
      STATUS_ACTIVE_SECONDS: ${STATUS_ACTIVE_SECONDS:-180}
      STATUS_STALE_SECONDS: ${STATUS_STALE_SECONDS:-600}
      HISTORY_RETENTION_HOURS: ${HISTORY_RETENTION_HOURS:-24}
      PRUNE_INTERVAL_MINUTES: ${PRUNE_INTERVAL_MINUTES:-30}
      ARCGIS_ENABLED: ${ARCGIS_ENABLED:-false}
      ARCGIS_FEATURE_SERVICE_URL: ${ARCGIS_FEATURE_SERVICE_URL:-}
      ARCGIS_CLIENT_ID: ${ARCGIS_CLIENT_ID:-}
      ARCGIS_CLIENT_SECRET: ${ARCGIS_CLIENT_SECRET:-}
      ARCGIS_SYNC_INTERVAL_SECONDS: ${ARCGIS_SYNC_INTERVAL_SECONDS:-30}
      WEBEOC_ENABLED: ${WEBEOC_ENABLED:-false}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      WS_HEARTBEAT_INTERVAL_MS: 30000
    networks:
      - tracking
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
      args:
        VITE_API_BASE_URL: ""
        VITE_WS_URL: ""
        VITE_API_KEY: ${API_KEY_DASHBOARD:-dev-dashboard-key}
        VITE_ADMIN_KEY: ${API_KEY_ADMIN:-dev-admin-key}
        VITE_MAP_CENTER_LAT: ${MAP_CENTER_LAT:--33.9399}
        VITE_MAP_CENTER_LON: ${MAP_CENTER_LON:-151.1753}
        VITE_MAP_DEFAULT_ZOOM: ${MAP_DEFAULT_ZOOM:-14}
        VITE_REFRESH_INTERVAL_MS: "10000"
    restart: unless-stopped
    networks:
      - tracking
    depends_on:
      api:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - tracking
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy

networks:
  tracking:
    driver: bridge
